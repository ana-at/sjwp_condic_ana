<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 2</title>
    <style>
        body {
            margin: 0;
        }
        .container {
            display: grid;
            box-sizing: border-box;
            gap: 20px;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 3fr 2fr 1fr;
            height: 100vh;
        }
        .m1 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
            gap: 10px;
        }
        .i1 {
            background-color: orange;
        }
        .m2 {
            background-color: greenyellow;
        }
        .m3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr;
            gap: 10px;
        }
        .i2 {
            background-color: cornflowerblue;
        }
        .m4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr;
            gap: 10px;
        }
        .i3 {
            background-color: lightgray;
        }
        @media (min-width: 321px) and (max-width: 768px) {
            .container {
                display: grid;
                box-sizing: border-box;
                gap: 20px;
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 3fr 2fr 1fr;
                height: 100vh;
            }
            .m1 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: 1fr;
                gap: 10px;
            }
            .i1 {
                background-color: orange;
            }
            .m2 {
                background-color: greenyellow;
            }
            .m3 {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-rows: 1fr;
                gap: 10px;
            }
            .i2 {
                background-color: cornflowerblue;
            }
            .m4 {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr 1fr;
                grid-template-rows: 1fr;
                gap: 10px;
            }
            .i3 {
                background-color: lightgray;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="m1">
            <div class="i1"></div>
            <div class="i1"></div>
        </div>
        <div class="m2"></div>
        <div class="m3">
            <div class="i2"></div>
            <div class="i2"></div>
            <div class="i2"></div>
        </div>
        <div class="m4">
            <div class="i3"></div>
            <div class="i3"></div>
            <div class="i3"></div>
            <div class="i3"></div>
        </div>
    </div>
</body>
</html>
