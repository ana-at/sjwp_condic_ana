<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 9</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            height: 98vh;
            gap: 30px;
        }
        .a {
            background-color: darkslategray;
            color: white;
            border-radius: 20px;
            font-size: 70px;
            padding-left: 80px;
            padding-top: 110px;
            grid-area: 1 / span 2;
        }
        .b {
            background-color: darkslategray;
            color: white;
            border-radius: 20px;
            font-size: 70px;
            padding-left: 80px;
            padding-top: 110px;
            grid-area: 1 / span 3;
        }
        .c {
            background-color: darkslategray;
            color: white;
            border-radius: 20px;
            font-size: 70px;
            padding-left: 80px;
            padding-top: 110px;
            grid-area: 2 / 1;
        }
        .d {
            background-color: darkslategray;
            color: white;
            border-radius: 20px;
            font-size: 70px;
            padding-left: 80px;
            padding-top: 110px;
            grid-area: 2 / 2 / 2 / 5;
        }
        .e {
            background-color: darkslategray;
            color: white;
            border-radius: 20px;
            font-size: 70px;
            padding-left: 80px;
            padding-top: 110px;
            order: 2;
            grid-area: 3 / span 5;
        }
        .f {
            background-color: blue;
            opacity: 0.4;
            color: white;
            border-radius: 20px;
            font-size: 70px;
            padding-left: 80px;
            padding-top: 110px;
            order: 1;
            grid-area: 2 / 3 / 2 / 6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="a">A</div>
        <div class="b">B</div>
        <div class="c">C</div>
        <div class="d">D</div>
        <div class="e">E</div>
        <div class="f">F</div>
    </div>
</body>
</html>
