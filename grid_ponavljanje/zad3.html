<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 3</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 98vh;
            gap: 30px;
        }
        .a {
            background-color: darkslategray;
            color: white;
            border-radius: 20px;
            font-size: 70px;
            padding-left: 80px;
            padding-top: 190px;
            grid-column: span 2;
        }
        .b {
            background-color: darkslategray;
            color: white;
            border-radius: 20px;
            font-size: 70px;
            padding-left: 80px;
            padding-top: 190px;
            grid-row: span 2;
        }
        .c {
            background-color: darkslategray;
            color: white;
            border-radius: 20px;
            font-size: 70px;
            padding-left: 80px;
            padding-top: 190px;
        }
        .d {
            background-color: darkslategray;
            color: white;
            border-radius: 20px;
            font-size: 70px;
            padding-left: 80px;
            padding-top: 190px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="a">A</div>
        <div class="b">B</div>
        <div class="c">C</div>
        <div class="d">D</div>
    </div>
</body>
</html>
