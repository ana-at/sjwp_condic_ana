<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 8</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 410px;
            gap: 10px;
            margin-top: 300px;
        }
        .one {
            background-color: darkslategray;
            font-size: xx-large;
            color: white;
            padding-left: 30px;
            padding-top: 80px;
            border-radius: 20px;
        }
        .two {
            background-color: lightgray;
            font-size: xx-large;
            color: darkslategray;
            padding-left: 30px;
            padding-top: 80px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="one">1</div>
        <div class="two">2</div>
        <div class="one">3</div>
        <div class="two">4</div>
        <div class="one">5</div>
        <div class="two">6</div>
        <div class="one">7</div>
        <div class="two">8</div>
        <div class="one">9</div>
        <div class="two">10</div>
        <div class="one">11</div>
        <div class="two">12</div>
    </div>
</body>
</html>
