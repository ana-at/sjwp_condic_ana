<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 2</title>
    <style>
        body{
            margin: 0;
        }
        .container{
            display: grid;
            height: 100vh;
            gap: 5px;
            box-sizing: border-box;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 3fr 1fr;
        }
        .a{
            background-color: purple;
            border-radius: 10px;
            grid-column: span 4;
        }
        .b{
            background-color: green;
            border-radius: 10px;
        }
        .c{
            background-color: yellow;
            border-radius: 10px;
            grid-column: span 3;
        }
        .d{
            background-color: blue;
            border-radius: 10px;
            grid-column: span 4;
        }
        p{
            margin-left: 47%;
        }
        @media (max-width: 768px) {
            .container{
            display: grid;
            height: 100vh;
            gap: 5px;
            box-sizing: border-box;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1.5fr 2.5fr 1fr;
        }
        .a{
            background-color: purple;
            border-radius: 10px;
            grid-column-start: 1;
            grid-column-end: 5;
        }
        .b{
            background-color: green;
            border-radius: 10px;
            grid-column-start: 1;
            grid-column-end: 5;
        }
        .c{
            background-color: yellow;
            border-radius: 10px;
            grid-row-start: 3;
            grid-row-end: 4;
            grid-column-start: 1;
            grid-column-end: 5;
        }
        .d{
            background-color: blue;
            border-radius: 10px;
            grid-column-start: 1;
            grid-column-end: 5;
        }
        p{
            margin-left: 44%;
        }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="a"><p>HEADER</p></div>
        <div class="b"><P>SIDEBAR</P></div>
        <div class="c"><p>MAIN CONTENT</p></div>
        <div class="d"><p>FOOTER</p></div>
    </div>
</body>
</html>
